<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen de Simulación UNAM - 3 Horas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* --- PANTALLA DE INICIO --- */
        #welcome-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a5276;
            color: white;
            position: absolute;
            width: 100%;
            z-index: 100;
        }
        .login-box {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 350px;
            text-align: center;
        }
        .login-box h2 { color: #1a5276; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .input-group input { 
            width: 100%; padding: 12px; border: 1px solid #ccc; 
            border-radius: 5px; box-sizing: border-box; 
        }
        .btn-start {
            background-color: #27ae60; color: white; border: none;
            padding: 15px 20px; width: 100%; border-radius: 5px;
            font-size: 18px; cursor: pointer; transition: 0.3s;
        }
        .btn-start:hover { background-color: #219150; }

        /* --- PANTALLA DE EXAMEN --- */
        #main-exam-container {
            display: none; /* Oculto hasta que inicien */
            flex-direction: row;
            height: 100vh;
            width: 100vw;
        }

        /* Temporizador Flotante */
        #timer-bar {
            position: fixed;
            top: 10px;
            right: 20px;
            background: rgba(192, 57, 43, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 20px;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .pdf-panel {
            flex: 1.2;
            background-color: #525659;
            padding: 10px;
            box-sizing: border-box;
        }
        .pdf-panel iframe {
            width: 100%; height: 100%; border: none; border-radius: 8px;
            background-color: white;
        }

        .exam-panel {
            flex: 0.8;
            background: #fff;
            padding: 30px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .subject-title {
            background-color: #1a5276; color: white;
            padding: 10px; margin-top: 30px; border-radius: 5px;
            position: sticky; top: 0; z-index: 10;
        }
        .question-block {
            margin-bottom: 15px; padding: 10px; border-bottom: 1px solid #eee;
        }
        .options label {
            margin-right: 15px; cursor: pointer; padding: 5px; border-radius: 4px;
        }
        .options label:hover { background-color: #f0f8ff; }

        .btn-submit {
            display: block; width: 100%; padding: 15px; background-color: #27ae60;
            color: white; border: none; border-radius: 5px; font-size: 18px;
            cursor: pointer; margin: 30px 0 50px 0;
        }

        #results {
            display: none; padding: 20px; background-color: #e8f8f5;
            border-radius: 8px; border: 2px solid #1abc9c; margin-bottom: 50px;
        }
        .total-score { font-size: 26px; font-weight: bold; text-align: center; color: #c0392b; }
        .result-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #ccc; }

        @media (max-width: 768px) {
            #main-exam-container { flex-direction: column; overflow: auto; }
            body { overflow: auto; }
            .pdf-panel { height: 50vh; flex: none; }
            .exam-panel { overflow-y: visible; flex: none; }
        }
    </style>
</head>
<body>

<div id="welcome-screen">
    <div class="login-box">
        <h2>Simulación UNAM</h2>
        <div class="input-group">
            <label>Nombre Completo:</label>
            <input type="text" id="studentName" placeholder="Ej. Juan Pérez">
        </div>
        <div class="input-group">
            <label>Número de Cuenta:</label>
            <input type="number" id="studentAccount" placeholder="000000000">
        </div>
        <p style="font-size: 13px; color: #666; margin-bottom: 20px;">
            Al comenzar, tendrás 180 minutos (3 horas) para completar las 120 preguntas.
        </p>
        <button class="btn-start" onclick="startExam()">Comenzar Examen</button>
    </div>
</div>

<div id="main-exam-container">
    <div id="timer-bar">Tiempo: 03:00:00</div>

    <div class="pdf-panel">
        <iframe src="area4.pdf"></iframe>
    </div>

    <div class="exam-panel">
        <h2 id="displayStudent"></h2>
        <div id="quiz-container"></div>
        <button id="submitBtn" class="btn-submit" onclick="gradeExam()">Finalizar y Calificar</button>

        <div id="results">
            <h2>Resultado Final</h2>
            <div class="total-score" id="resTotal">0 / 120</div>
            <hr>
            <div id="resSubjects"></div>
        </div>
    </div>
</div>

<script>
    const TOTAL_MINUTES = 180;
    let secondsRemaining = TOTAL_MINUTES * 60;
    let timerInterval;

    const examData = [
        { q: 1, subject: 'Física', ans: 'C' }, { q: 2, subject: 'Física', ans: 'D' }, { q: 3, subject: 'Física', ans: 'A' }, { q: 4, subject: 'Física', ans: 'B' }, { q: 5, subject: 'Física', ans: 'D' }, { q: 6, subject: 'Física', ans: 'D' }, { q: 7, subject: 'Física', ans: 'B' }, { q: 8, subject: 'Física', ans: 'B' }, { q: 9, subject: 'Física', ans: 'A' }, { q: 10, subject: 'Física', ans: 'A' },
        { q: 11, subject: 'Literatura', ans: 'A' }, { q: 12, subject: 'Literatura', ans: 'C' }, { q: 13, subject: 'Literatura', ans: 'D' }, { q: 14, subject: 'Literatura', ans: 'C' }, { q: 15, subject: 'Literatura', ans: 'D' }, { q: 16, subject: 'Literatura', ans: 'A' }, { q: 17, subject: 'Literatura', ans: 'A' }, { q: 18, subject: 'Literatura', ans: 'A' }, { q: 19, subject: 'Literatura', ans: 'A' }, { q: 20, subject: 'Literatura', ans: 'A' },
        { q: 21, subject: 'Química', ans: 'A' }, { q: 22, subject: 'Química', ans: 'D' }, { q: 23, subject: 'Química', ans: 'C' }, { q: 24, subject: 'Química', ans: 'C' }, { q: 25, subject: 'Química', ans: 'B' }, { q: 26, subject: 'Química', ans: 'D' }, { q: 27, subject: 'Química', ans: 'B' }, { q: 28, subject: 'Química', ans: 'B' }, { q: 29, subject: 'Química', ans: 'B' }, { q: 30, subject: 'Química', ans: 'D' },
        { q: 31, subject: 'Geografía', ans: 'C' }, { q: 32, subject: 'Geografía', ans: 'D' }, { q: 33, subject: 'Geografía', ans: 'B' }, { q: 34, subject: 'Geografía', ans: 'B' }, { q: 35, subject: 'Geografía', ans: 'B' }, { q: 36, subject: 'Geografía', ans: 'B' }, { q: 37, subject: 'Geografía', ans: 'B' }, { q: 38, subject: 'Geografía', ans: 'D' }, { q: 39, subject: 'Geografía', ans: 'D' }, { q: 40, subject: 'Geografía', ans: 'A' },
        { q: 41, subject: 'Matemáticas', ans: 'C' }, { q: 42, subject: 'Matemáticas', ans: 'B' }, { q: 43, subject: 'Matemáticas', ans: 'A' }, { q: 44, subject: 'Matemáticas', ans: 'B' }, { q: 45, subject: 'Matemáticas', ans: 'D' }, { q: 46, subject: 'Matemáticas', ans: 'D' }, { q: 47, subject: 'Matemáticas', ans: 'A' }, { q: 48, subject: 'Matemáticas', ans: 'C' }, { q: 49, subject: 'Matemáticas', ans: 'C' }, { q: 50, subject: 'Matemáticas', ans: 'B' }, { q: 51, subject: 'Matemáticas', ans: 'A' }, { q: 52, subject: 'Matemáticas', ans: 'A' }, { q: 53, subject: 'Matemáticas', ans: 'D' }, { q: 54, subject: 'Matemáticas', ans: 'A' }, { q: 55, subject: 'Matemáticas', ans: 'A' }, { q: 56, subject: 'Matemáticas', ans: 'A' }, { q: 57, subject: 'Matemáticas', ans: 'A' }, { q: 58, subject: 'Matemáticas', ans: 'D' }, { q: 59, subject: 'Matemáticas', ans: 'D' }, { q: 60, subject: 'Matemáticas', ans: 'B' }, { q: 61, subject: 'Matemáticas', ans: 'D' }, { q: 62, subject: 'Matemáticas', ans: 'D' },
        { q: 63, subject: 'Español', ans: 'C' }, { q: 64, subject: 'Español', ans: 'C' }, { q: 65, subject: 'Español', ans: 'D' }, { q: 66, subject: 'Español', ans: 'C' }, { q: 67, subject: 'Español', ans: 'D' }, { q: 68, subject: 'Español', ans: 'C' }, { q: 69, subject: 'Español', ans: 'C' }, { q: 70, subject: 'Español', ans: 'C' }, { q: 71, subject: 'Español', ans: 'C' }, { q: 72, subject: 'Español', ans: 'A' }, { q: 73, subject: 'Español', ans: 'C' }, { q: 74, subject: 'Español', ans: 'D' }, { q: 75, subject: 'Español', ans: 'A' }, { q: 76, subject: 'Español', ans: 'C' }, { q: 77, subject: 'Español', ans: 'B' }, { q: 78, subject: 'Español', ans: 'D' }, { q: 79, subject: 'Español', ans: 'A' }, { q: 80, subject: 'Español', ans: 'A' },
        { q: 81, subject: 'Biología', ans: 'A' }, { q: 82, subject: 'Biología', ans: 'B' }, { q: 83, subject: 'Biología', ans: 'B' }, { q: 84, subject: 'Biología', ans: 'D' }, { q: 85, subject: 'Biología', ans: 'D' }, { q: 86, subject: 'Biología', ans: 'C' }, { q: 87, subject: 'Biología', ans: 'A' }, { q: 88, subject: 'Biología', ans: 'C' }, { q: 89, subject: 'Biología', ans: 'A' }, { q: 90, subject: 'Biología', ans: 'C' },
        { q: 91, subject: 'Historia Universal', ans: 'B' }, { q: 92, subject: 'Historia Universal', ans: 'A' }, { q: 93, subject: 'Historia Universal', ans: 'B' }, { q: 94, subject: 'Historia Universal', ans: 'A' }, { q: 95, subject: 'Historia Universal', ans: 'A' }, { q: 96, subject: 'Historia Universal', ans: 'A' }, { q: 97, subject: 'Historia Universal', ans: 'A' }, { q: 98, subject: 'Historia Universal', ans: 'C' }, { q: 99, subject: 'Historia Universal', ans: 'B' }, { q: 100, subject: 'Historia Universal', ans: 'B' },
        { q: 101, subject: 'Historia de México', ans: 'C' }, { q: 102, subject: 'Historia de México', ans: 'D' }, { q: 103, subject: 'Historia de México', ans: 'A' }, { q: 104, subject: 'Historia de México', ans: 'D' }, { q: 105, subject: 'Historia de México', ans: 'A' }, { q: 106, subject: 'Historia de México', ans: 'D' }, { q: 107, subject: 'Historia de México', ans: 'B' }, { q: 108, subject: 'Historia de México', ans: 'D' }, { q: 109, subject: 'Historia de México', ans: 'B' }, { q: 110, subject: 'Historia de México', ans: 'D' },
        { q: 111, subject: 'Filosofía', ans: 'D' }, { q: 112, subject: 'Filosofía', ans: 'C' }, { q: 113, subject: 'Filosofía', ans: 'B' }, { q: 114, subject: 'Filosofía', ans: 'A' }, { q: 115, subject: 'Filosofía', ans: 'D' }, { q: 116, subject: 'Filosofía', ans: 'C' }, { q: 117, subject: 'Filosofía', ans: 'C' }, { q: 118, subject: 'Filosofía', ans: 'C' }, { q: 119, subject: 'Filosofía', ans: 'B' }, { q: 120, subject: 'Filosofía', ans: 'C' }
    ];

    function startExam() {
        const name = document.getElementById('studentName').value;
        const account = document.getElementById('studentAccount').value;

        if (!name || !account) {
            alert("Por favor rellena tus datos.");
            return;
        }

        document.getElementById('welcome-screen').style.display = 'none';
        document.getElementById('main-exam-container').style.display = 'flex';
        document.getElementById('displayStudent').textContent = `Alumno: ${name} (${account})`;

        renderQuiz();
        startTimer();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            secondsRemaining--;
            
            let h = Math.floor(secondsRemaining / 3600);
            let m = Math.floor((secondsRemaining % 3600) / 60);
            let s = secondsRemaining % 60;

            document.getElementById('timer-bar').textContent = 
                `Tiempo: ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

            if (secondsRemaining <= 0) {
                clearInterval(timerInterval);
                alert("¡El tiempo se ha agotado!");
                gradeExam();
            }
        }, 1000);
    }

    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        let currentSubject = '';

        examData.forEach(item => {
            if (item.subject !== currentSubject) {
                currentSubject = item.subject;
                const h3 = document.createElement('h3');
                h3.className = 'subject-title';
                h3.textContent = currentSubject;
                container.appendChild(h3);
            }

            const div = document.createElement('div');
            div.className = 'question-block';
            div.innerHTML = `<span style="font-weight:bold; width:35px; display:inline-block;">${item.q}.</span>
                <div class="options" style="display:inline-block">
                    ${['A','B','C','D'].map(opt => `
                        <label><input type="radio" name="q${item.q}" value="${opt}"> ${opt}</label>
                    `).join('')}
                </div>`;
            container.appendChild(div);
        });
    }

    function gradeExam() {
        clearInterval(timerInterval);
        let totalCorrect = 0;
        const subjectScores = {};

        examData.forEach(item => {
            if(!subjectScores[item.subject]) subjectScores[item.subject] = {c:0, t:0};
            subjectScores[item.subject].t++;

            const sel = document.querySelector(`input[name="q${item.q}"]:checked`);
            if (sel && sel.value === item.ans) {
                totalCorrect++;
                subjectScores[item.subject].c++;
            }
        });

        document.getElementById('resTotal').textContent = `${totalCorrect} / 120`;
        const resDiv = document.getElementById('resSubjects');
        resDiv.innerHTML = '';
        for (const s in subjectScores) {
            resDiv.innerHTML += `<div class="result-item"><span>${s}</span><span>${subjectScores[s].c} / ${subjectScores[s].t}</span></div>`;
        }

        document.getElementById('results').style.display = 'block';
        document.getElementById('submitBtn').style.display = 'none';
        document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);
        document.getElementById('results').scrollIntoView({behavior: 'smooth'});
    }
</script>

</body>
</html>
