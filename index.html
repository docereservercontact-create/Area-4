<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen de Simulación UNAM</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Evita el scroll en toda la página */
        }
        
        /* Contenedor principal para dividir la pantalla */
        .main-wrapper {
            display: flex;
            height: 100vh; /* Ocupa toda la altura de la ventana */
            width: 100vw;
        }

        /* Panel izquierdo para el PDF */
        .pdf-panel {
            flex: 1.2; /* Toma un poco más de la mitad del espacio */
            background-color: #525659; /* Color típico de fondo de lectores PDF */
            padding: 10px;
            box-sizing: border-box;
        }

        .pdf-panel iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            background-color: white;
        }

        /* Panel derecho para el formulario */
        .exam-panel {
            flex: 0.8; /* Toma el resto del espacio */
            background: #fff;
            padding: 30px;
            box-sizing: border-box;
            overflow-y: auto; /* Permite hacer scroll solo en esta sección */
            box-shadow: -5px 0 15px rgba(0,0,0,0.05);
        }

        h1, h2 {
            text-align: center;
            color: #1a5276;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .subject-title {
            background-color: #1a5276;
            color: white;
            padding: 10px;
            margin-top: 30px;
            border-radius: 5px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .question-block {
            margin-bottom: 15px;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .question-number {
            font-weight: bold;
            margin-right: 15px;
            display: inline-block;
            width: 40px;
        }
        .options {
            display: inline-block;
        }
        .options label {
            display: inline-block;
            font-weight: normal;
            margin-right: 15px;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
        }
        .options label:hover {
            background-color: #f0f8ff;
        }
        .btn-submit {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 30px;
            margin-bottom: 30px;
            transition: background 0.3s;
        }
        .btn-submit:hover {
            background-color: #219150;
        }
        #results {
            display: none;
            margin-top: 30px;
            margin-bottom: 50px;
            padding: 20px;
            background-color: #e8f8f5;
            border-radius: 8px;
            border: 2px solid #1abc9c;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #ccc;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .total-score {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            color: #c0392b;
            margin-bottom: 20px;
        }

        /* Diseño responsivo para pantallas pequeñas (celulares) */
        @media (max-width: 768px) {
            .main-wrapper {
                flex-direction: column;
                overflow: auto;
            }
            body { overflow: auto; }
            .pdf-panel { height: 50vh; flex: none; }
            .exam-panel { overflow-y: visible; flex: none; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="pdf-panel">
        <iframe src="area4.pdf" title="Examen PDF">
            Tu navegador no soporta iframes. Por favor, abre el PDF manualmente.
        </iframe>
    </div>

    <div class="exam-panel">
        <h1>Hoja de Respuestas</h1>
        
        <div id="student-info">
            <div class="form-group">
                <label for="studentName">Nombre del Alumno:</label>
                <input type="text" id="studentName" placeholder="Ingresa tu nombre completo" required>
            </div>
            <div class="form-group">
                <label for="studentAccount">Número de Cuenta:</label>
                <input type="number" id="studentAccount" placeholder="Ingresa tu número de cuenta" required>
            </div>
        </div>

        <div id="quiz-container">
            </div>

        <button id="submitBtn" class="btn-submit" onclick="gradeExam()">Calificar Examen</button>

        <div id="results">
            <h2>Resultados del Examen</h2>
            <p><strong>Alumno:</strong> <span id="resName"></span></p>
            <p><strong>No. de Cuenta:</strong> <span id="resAccount"></span></p>
            <div class="total-score">
                Calificación Total: <span id="resTotal"></span> / 120
            </div>
            <h3>Desglose por Materia</h3>
            <div id="resSubjects"></div>
        </div>
    </div>
</div>

        { q: 41, subject: 'Matemáticas', ans: 'C' }, { q: 42, subject: 'Matemáticas', ans: 'B' }, { q: 43, subject: 'Matemáticas', ans: 'A' }, { q: 44, subject: 'Matemáticas', ans: 'B' }, { q: 45, subject: 'Matemáticas', ans: 'D' }, { q: 46, subject: 'Matemáticas', ans: 'D' }, { q: 47, subject: 'Matemáticas', ans: 'A' }, { q: 48, subject: 'Matemáticas', ans: 'C' }, { q: 49, subject: 'Matemáticas', ans: 'C' }, { q: 50, subject: 'Matemáticas', ans: 'B' }, { q: 51, subject: 'Matemáticas', ans: 'A' }, { q: 52, subject: 'Matemáticas', ans: 'A' }, { q: 53, subject: 'Matemáticas', ans: 'D' }, { q: 54, subject: 'Matemáticas', ans: 'A' }, { q: 55, subject: 'Matemáticas', ans: 'A' }, { q: 56, subject: 'Matemáticas', ans: 'A' }, { q: 57, subject: 'Matemáticas', ans: 'A' }, { q: 58, subject: 'Matemáticas', ans: 'D' }, { q: 59, subject: 'Matemáticas', ans: 'D' }, { q: 60, subject: 'Matemáticas', ans: 'B' }, { q: 61, subject: 'Matemáticas', ans: 'D' }, { q: 62, subject: 'Matemáticas', ans: 'D' },

    ];

    // Renderizar las preguntas
    function renderQuiz() {
        const container = document.getElementById('quiz-container');
        let currentSubject = '';

        examData.forEach(item => {
            if (item.subject !== currentSubject) {
                currentSubject = item.subject;
                const subjectHeader = document.createElement('h3');
                subjectHeader.className = 'subject-title';
                subjectHeader.textContent = currentSubject;
                container.appendChild(subjectHeader);
            }

            const questionBlock = document.createElement('div');
            questionBlock.className = 'question-block';

            const numberLabel = document.createElement('span');
            numberLabel.className = 'question-number';
            numberLabel.textContent = `${item.q}.-`;

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            const options = ['A', 'B', 'C', 'D'];
            
            options.forEach(opt => {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q${item.q}`;
                radio.value = opt;
                
                label.appendChild(radio);
                label.appendChild(document.createTextNode(` ${opt}`));
                optionsDiv.appendChild(label);
            });

            questionBlock.appendChild(numberLabel);
            questionBlock.appendChild(optionsDiv);
            container.appendChild(questionBlock);
        });
    }

    // Calcular la calificación
    function gradeExam() {
        const name = document.getElementById('studentName').value.trim();
        const account = document.getElementById('studentAccount').value.trim();

        if (!name || !account) {
            alert('Por favor, ingresa tu nombre y número de cuenta antes de calificar.');
            return;
        }

        let totalCorrect = 0;
        const subjectScores = {};

        examData.forEach(item => {
            if (!subjectScores[item.subject]) {
                subjectScores[item.subject] = { correct: 0, total: 0 };
            }
            subjectScores[item.subject].total++;
        });

        examData.forEach(item => {
            const selectedOption = document.querySelector(`input[name="q${item.q}"]:checked`);
            if (selectedOption && selectedOption.value === item.ans) {
                totalCorrect++;
                subjectScores[item.subject].correct++;
            }
        });

        document.getElementById('resName').textContent = name;
        document.getElementById('resAccount').textContent = account;
        document.getElementById('resTotal').textContent = totalCorrect;

        const resSubjectsContainer = document.getElementById('resSubjects');
        resSubjectsContainer.innerHTML = ''; 

        for (const [subject, score] of Object.entries(subjectScores)) {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `<span><strong>${subject}</strong></span> <span>${score.correct} / ${score.total}</span>`;
            resSubjectsContainer.appendChild(div);
        }

        document.getElementById('submitBtn').style.display = 'none';
        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';
        
        const allRadios = document.querySelectorAll('input[type="radio"]');
        allRadios.forEach(r => r.disabled = true);
        
        // Scroll hacia los resultados dentro del panel
        resultsDiv.scrollIntoView({ behavior: 'smooth' });
    }

    window.onload = renderQuiz;
</script>

</body>
</html>
